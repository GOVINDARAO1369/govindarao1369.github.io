    height:100vh;
    background: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6));

.slideshow{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.slideshow img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    animation:fade 10s infinite;
}

.slideshow img:nth-child(2){
    animation-delay:5s;
}

@keyframes fade{
    0%{opacity:0;}
    10%{opacity:1;}
    40%{opacity:1;}
    50%{opacity:0;}
    100%{opacity:0;}
}

.content{
    padding-top:100px;
}

button{
    background:#ff6600;
    color:white;
    padding:15px 25px;
    border:none;

}
